<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; script-src 'self' 'unsafe-inline'; connect-src 'self';" />
  <title>Sy — Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>html{-webkit-tap-highlight-color:transparent}@media(prefers-color-scheme:dark){html{color-scheme:dark}}@media(prefers-color-scheme:light){html{color-scheme:light}}</style>
  <script>
    (function() {
      var mq = window.matchMedia('(prefers-color-scheme: light)');
      document.documentElement.setAttribute('data-theme', mq.matches ? 'light' : 'dark');
      mq.addEventListener('change', function(e) {
        document.documentElement.setAttribute('data-theme', e.matches ? 'light' : 'dark');
      });
    })();
  </script>
</head>
<body>
<div class="bg-layer" aria-hidden="true"></div>
<div class="bg-overlay" aria-hidden="true"></div>
<div class="app">
  <aside class="sidebar" id="sidebar" aria-label="Profile sidebar"></aside>
  <main class="main-content">
    <div id="timeline" class="timeline" aria-label="Tweets"></div>
    <footer id="footer" class="footer" role="contentinfo"></footer>
  </main>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
