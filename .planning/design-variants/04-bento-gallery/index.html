<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sy — Bento Gallery</title>
<script>(function(){var t=document.documentElement;t.setAttribute('data-theme',window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(e){t.setAttribute('data-theme',e.matches?'dark':'light');});})();</script>
</head>
<body>
<div class="app">
  <section class="hero-grid">
    <div class="hero-profile" id="profile-section"></div>
    <div class="hero-stat"><div class="hero-stat-value" id="stat-posts">0</div><div class="hero-stat-label">Posts</div></div>
    <div class="hero-stat"><div class="hero-stat-value" id="stat-words">0</div><div class="hero-stat-label">Words</div></div>
  </section>
  <div id="timeline" class="timeline"></div>
  <footer id="footer" class="footer"></footer>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
