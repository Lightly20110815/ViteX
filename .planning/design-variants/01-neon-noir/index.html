<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; script-src 'self' 'unsafe-inline'; connect-src 'self';" />
  <title>Sy — Neon Noir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script>
    (function() {
      var t = document.documentElement;
      if (!window.matchMedia('(prefers-color-scheme: light)').matches) t.setAttribute('data-theme','dark');
      else t.setAttribute('data-theme','light');
    })();
  </script>
</head>
<body>
  <div class="bg-container" aria-hidden="true">
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>
    <div class="bg-image"></div>
    <div class="bg-grid"></div>
  </div>
  <main class="app">
    <header id="profile" class="hero"></header>
    <div id="timeline" class="timeline"></div>
    <footer id="footer" class="footer"></footer>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
