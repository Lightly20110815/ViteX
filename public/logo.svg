<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F5F7"/>
      <stop offset="100%" stop-color="#E8E8ED"/>
    </linearGradient>
    <linearGradient id="v" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#646CFF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="vDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2997FF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#bg)" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>

  <!-- V letterform — clean & bold -->
  <path d="M18 20 L26 44 L32 30 L38 44 L46 20"
        stroke="url(#v)"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Subtle X mark on top right -->
  <g transform="translate(40, 16)" stroke="url(#v)" stroke-width="2.5" stroke-linecap="round">
    <line x1="0" y1="0" x2="8" y2="8"/>
    <line x1="8" y1="0" x2="0" y2="8"/>
  </g>

  <!-- Tiny dot on V apex -->
  <circle cx="32" cy="16" r="2.5" fill="#646CFF"/>
</svg>
