<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>17-pop-art — ViteX Demo</title>
<style>
/* ===== Variant 17 — Pop Art (波普艺术) =====
   Bold colors · Comic · Halftone · Playful
   Typography: Bangers + Comic Neue
   ========================================== */

@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Noto+Sans+SC:wght@400;500;700&display=swap');

:root {
  --font-display: "Bangers", cursive;
  --font-body: "Comic Neue", "Noto Sans SC", cursive;
  --yellow: #FFE600;
  --red: #FF3B3B;
  --blue: #3B82F6;
  --cyan: #00E5FF;
  --pink: #FF6BC1;
  --white: #FFFFFF;
  --black: #1A1A2E;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 400;
  line-height: 1.6;
  color: var(--black);
  background: var(--yellow);
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.2) 1px, transparent 1px);
  background-size: 20px 20px;
  min-height: 100vh;
}

.app { max-width: 680px; margin: 0 auto; padding: 0 20px; }

.hero { padding: 48px 0 36px; text-align: center; }

.hero-avatar-wrap { display: inline-block; margin-bottom: 16px; position: relative; }

.hero-avatar {
  width: 96px; height: 96px;
  border-radius: 50%;
  object-fit: cover;
  border: 5px solid var(--black);
  box-shadow: 6px 6px 0 var(--red);
  transition: box-shadow 0.2s;
}
.hero-avatar:hover { box-shadow: 10px 10px 0 var(--red); }

.hero-avatar-fallback {
  width: 96px; height: 96px; border-radius: 50%;
  background: var(--cyan);
  border: 5px solid var(--black);
  color: var(--black);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 40px;
  margin: 0 auto;
  box-shadow: 6px 6px 0 var(--red);
}

.hero-username {
  font-family: var(--font-display);
  font-size: 56px;
  font-weight: 400;
  color: var(--red);
  text-shadow: 4px 4px 0 var(--black);
  letter-spacing: 0.04em;
  margin: 8px 0;
  -webkit-text-stroke: 1px var(--black);
}

.hero-bio { font-size: 15px; color: var(--black); max-width: 440px; margin: 0 auto; }

.timeline { display: flex; flex-direction: column; gap: 24px; padding-bottom: 48px; }

.tweet-card {
  background: var(--white);
  border: 4px solid var(--black);
  border-radius: 16px;
  box-shadow: 8px 8px 0 var(--blue);
  padding: 24px 28px;
  transition: box-shadow 0.2s, transform 0.2s;
}
.tweet-card:hover { box-shadow: 12px 12px 0 var(--pink); transform: translate(-2px,-2px); }

.tweet-header { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
.tweet-username { font-family: var(--font-display); font-size: 20px; font-weight: 400; color: var(--blue); letter-spacing: 0.04em; -webkit-text-stroke: 0.5px var(--black); }
.tweet-mood { font-size: 18px; }
.tweet-time { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--blue); }

.tweet-body { font-size: 15px; line-height: 1.7; }
.tweet-body p { margin-bottom: 8px; }
.tweet-body strong { font-weight: 700; background: var(--yellow); padding: 0 4px; }
.tweet-body a { color: var(--red); font-weight: 700; text-decoration: none; border-bottom: 2px solid var(--black); }
.tweet-body a:hover { color: var(--pink); }
.tweet-body code { font-size: 0.88em; background: var(--yellow); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--black); }
.tweet-body pre { background: var(--black); color: var(--cyan); border: 2px solid var(--black); border-radius: 12px; padding: 16px 20px; margin: 12px 0; overflow-x: auto; }
.tweet-body pre code { background: none; border: none; padding: 0; color: inherit; }
.tweet-body blockquote { border-left: 6px solid var(--red); padding: 8px 16px; margin: 14px 0; background: rgba(255,59,59,0.05); border-radius: 0 8px 8px 0; }
.tweet-body img { max-width: 100%; border: 3px solid var(--black); border-radius: 12px; margin: 10px 0; box-shadow: 4px 4px 0 var(--yellow); }
.tweet-body h1,.tweet-body h2,.tweet-body h3{font-family:var(--font-display);font-weight:400;margin:20px 0 10px;color:var(--red);-webkit-text-stroke:0.5px var(--black)}

.tweet-card-empty { text-align: center; padding: 56px 24px; border-style: dashed; }
.tweet-card-empty h2 { font-family: var(--font-display); font-size: 28px; color: var(--blue); margin-bottom: 8px; }

.footer { text-align: center; padding: 24px 0 56px; font-family: var(--font-display); font-size: 16px; color: var(--black); letter-spacing: 0.04em; }
.footer::before { content: "💥 "; }

@media(max-width:640px){.hero-username{font-size:40px}.tweet-card{padding:18px 20px;box-shadow:4px 4px 0 var(--blue)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:0.01ms!important}}
</style>
</head>
<body>
<main class="app"><header id="profile" class="hero"></header><div id="timeline" class="timeline"></div><footer id="footer" class="footer"></footer></main>
<script type="module" src="/src/main-variant.ts"></script>
</body>
</html>
