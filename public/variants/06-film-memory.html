<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>06-film-memory — ViteX Demo</title>
<style>
/* ===== Variant 6 — Film Memory (胶片记忆) =====
   Vintage · Grain · Polaroid · Warm Amber
   Typography: Abril Fatface + Merriweather
   ========================================== */

@import url('https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;700&display=swap');

:root {
  --font-display: "Abril Fatface", "Noto Serif JP", Georgia, serif;
  --font-body: "Merriweather", "Noto Sans SC", Georgia, serif;
  --bg-cream: #FEF9F0;
  --bg-card: #FDF5E8;
  --bg-dark: #2C1810;
  --text-primary: #3C2415;
  --text-secondary: #8B6914;
  --text-tertiary: #B8956A;
  --accent-amber: #D97706;
  --accent-burgundy: #9B2D30;
  --border-warm: rgba(139,105,20,0.15);
}

:root[data-theme="dark"] {
  --bg-cream: #1A1008;
  --bg-card: #241810;
  --bg-dark: #0D0804;
  --text-primary: #F5E6D3;
  --text-secondary: #C9A96E;
  --text-tertiary: #8B6914;
  --border-warm: rgba(201,169,110,0.1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.75;
  color: var(--text-primary);
  background: var(--bg-cream);
}

/* Film grain overlay */
body::after {
  content: ""; position: fixed; inset: 0; z-index: 999; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23grain)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.6;
}

/* ----- Journal Layout: timeline rail on left ----- */
.app {
  max-width: 700px;
  margin: 0 auto;
  padding: 60px 32px;
}

.hero {
  text-align: center;
  padding-bottom: 48px;
  margin-bottom: 48px;
  border-bottom: 1px double var(--border-warm);
}

.hero-avatar {
  width: 100px; height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid var(--border-warm);
  filter: sepia(0.2);
}

.hero-avatar-fallback {
  width: 100px; height: 100px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-amber), var(--accent-burgundy));
  color: #FDF5E8;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 36px;
  margin: 0 auto;
  border: 4px solid var(--border-warm);
}

.hero-username {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 400;
  color: var(--text-primary);
  margin-top: 16px;
  letter-spacing: 0.02em;
}

.hero-bio {
  margin-top: 12px;
  font-size: 14px;
  font-style: italic;
  color: var(--text-secondary);
  max-width: 440px;
  margin-left: auto;
  margin-right: auto;
}

/* ----- Timeline with date markers ----- */
.timeline {
  position: relative;
  padding-left: 48px;
}

/* Timeline rail */
.timeline::before {
  content: "";
  position: absolute;
  left: 15px; top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(to bottom, var(--border-warm), var(--border-warm) 80%, transparent);
}

.tweet-card {
  position: relative;
  margin-bottom: 40px;
}

/* Date dot on rail */
.tweet-card::before {
  content: "";
  position: absolute;
  left: -37px; top: 6px;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--accent-amber);
  box-shadow: 0 0 0 4px var(--bg-cream);
}

.tweet-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 8px;
}

.tweet-username {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: 0.03em;
}

.tweet-mood { font-size: 16px; }

.tweet-time {
  margin-left: auto;
  font-size: 11px;
  font-style: italic;
  color: var(--text-tertiary);
  font-family: var(--font-body);
}

.tweet-body {
  font-size: 15px;
  line-height: 1.8;
  font-family: var(--font-body);
}

.tweet-body p { margin-bottom: 10px; text-indent: 0; }
.tweet-body p:first-of-type::first-letter { font-family: var(--font-display); font-size: 2.5em; float: left; line-height: 0.8; padding-right: 8px; padding-top: 4px; color: var(--accent-burgundy); }
.tweet-body p:last-child { margin-bottom: 0; }
.tweet-body strong { font-weight: 700; }
.tweet-body em { font-style: italic; }
.tweet-body a { color: var(--accent-burgundy); text-decoration: none; border-bottom: 1px dotted var(--accent-amber); }
.tweet-body a:hover { border-bottom-style: solid; }
.tweet-body code { font-size: 0.88em; background: rgba(139,105,20,0.1); padding: 2px 6px; border-radius: 3px; }
.tweet-body pre { background: var(--bg-card); border: 1px solid var(--border-warm); padding: 14px 18px; margin: 12px 0; overflow-x: auto; font-size: 13px; border-radius: 4px; }
.tweet-body pre code { background: none; padding: 0; }
.tweet-body blockquote { border-left: 3px solid var(--accent-amber); padding-left: 16px; margin: 14px 0; font-style: italic; color: var(--text-secondary); }
.tweet-body img { max-width: 100%; margin: 12px 0; box-shadow: 0 2px 12px rgba(60,36,21,0.15); }

/* Polaroid-style image treatment */
.tweet-body img {
  padding: 8px 8px 24px 8px;
  background: var(--bg-card);
  transform: rotate(0.5deg);
  border: 1px solid var(--border-warm);
}
.tweet-body img:nth-child(even) { transform: rotate(-0.3deg); }

.tweet-body h1, .tweet-body h2, .tweet-body h3 {
  font-family: var(--font-display);
  font-weight: 400;
  margin: 24px 0 12px;
  color: var(--text-primary);
}

/* Empty */
.tweet-card-empty {
  text-align: center;
  padding: 64px 0;
}
.tweet-card-empty h2 { font-family: var(--font-display); font-size: 28px; font-weight: 400; margin-bottom: 8px; }
.tweet-card-empty p { font-style: italic; color: var(--text-secondary); }

.footer {
  text-align: center;
  padding: 32px 0 48px;
  font-family: var(--font-body);
  font-style: italic;
  font-size: 12px;
  color: var(--text-tertiary);
}

@media (max-width: 640px) {
  .app { padding: 40px 16px; }
  .timeline { padding-left: 32px; }
  .hero-username { font-size: 34px; }
  .tweet-card::before { left: -26px; }
}

@media (prefers-reduced-motion: reduce) { *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;} }
</style>
</head>
<body>
<main class="app">
  <header id="profile" class="hero"></header>
  <div id="timeline" class="timeline"></div>
  <footer id="footer" class="footer"></footer>
</main>
<script type="module" src="/src/main.ts"></script>
<script type="module" src="/src/main-variant.ts"></script>
</body>
</html>
