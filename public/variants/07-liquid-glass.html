<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>07-liquid-glass — ViteX Demo</title>
<style>
/* ===== Variant 7 — Liquid Glass (流光玻璃) =====
   Iridescent · Depth · Morphing · Premium
   Typography: Varela Round + Nunito Sans
   ========================================== */

@import url('https://fonts.googleapis.com/css2?family=Varela+Round&family=Nunito+Sans:ital,opsz,wght@0,6..12,300;0,6..12,400;0,6..12,600;0,6..12,700;1,6..12,300&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --font-display: "Varela Round", system-ui, sans-serif;
  --font-body: "Nunito Sans", "Noto Sans SC", system-ui, sans-serif;
  --gradient-bg-1: #FDF2F8;
  --gradient-bg-2: #FEF3C7;
  --gradient-bg-3: #F0F9FF;
  --glass: rgba(255,255,255,0.55);
  --glass-border: rgba(255,255,255,0.6);
  --glass-shadow: 0 8px 32px rgba(219,39,119,0.06);
  --text-primary: #4A1942;
  --text-secondary: #9D6589;
  --text-tertiary: #C49BB5;
  --accent-pink: #DB2777;
  --accent-gold: #CA8A04;
}

:root[data-theme="dark"] {
  --gradient-bg-1: #1A0A14;
  --gradient-bg-2: #1A1206;
  --gradient-bg-3: #06121A;
  --glass: rgba(20,10,20,0.5);
  --glass-border: rgba(255,255,255,0.08);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.4);
  --text-primary: #FCE7F3;
  --text-secondary: #D4A0BB;
  --text-tertiary: #9D6589;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.7;
  color: var(--text-primary);
  background: linear-gradient(135deg, var(--gradient-bg-1) 0%, var(--gradient-bg-2) 40%, var(--gradient-bg-3) 100%);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Floating gradient orbs */
.orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none; }
.orb-1 { width: 400px; height: 400px; background: rgba(219,39,119,0.15); top: -100px; right: -100px; animation: orbFloat 20s ease-in-out infinite; }
.orb-2 { width: 300px; height: 300px; background: rgba(202,138,4,0.1); bottom: -80px; left: -80px; animation: orbFloat 25s ease-in-out infinite reverse; }
.orb-3 { width: 250px; height: 250px; background: rgba(59,130,246,0.08); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: orbFloat 18s ease-in-out infinite; }

@keyframes orbFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  25% { transform: translate(30px,-20px) scale(1.1); }
  50% { transform: translate(-10px,20px) scale(0.9); }
  75% { transform: translate(20px,10px) scale(1.05); }
}

/* ----- Layered glass layout ----- */
.app { position: relative; z-index: 10; max-width: 660px; margin: 0 auto; padding: 0 24px; }

.hero { padding: 56px 0 36px; text-align: center; }

.hero-avatar {
  width: 88px; height: 88px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
  backdrop-filter: blur(8px);
}

.hero-avatar-fallback {
  width: 88px; height: 88px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-pink), var(--accent-gold));
  color: #FFF;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 32px;
  margin: 0 auto;
  border: 3px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
}

.hero-username {
  font-family: var(--font-display);
  font-size: 34px;
  font-weight: 400;
  color: var(--text-primary);
  margin-top: 16px;
}

.hero-bio {
  margin-top: 8px;
  font-size: 14px;
  color: var(--text-secondary);
  max-width: 420px;
  margin-left: auto;
  margin-right: auto;
}

/* ----- Glass Cards with depth stacking ----- */
.timeline {
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding-bottom: 48px;
}

.tweet-card {
  background: var(--glass);
  backdrop-filter: blur(24px) saturate(1.6);
  -webkit-backdrop-filter: blur(24px) saturate(1.6);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  box-shadow: var(--glass-shadow);
  padding: 28px 32px;
  transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
  position: relative;
}

/* Depth stacking: alternating cards float at different z-levels */
.tweet-card:nth-child(odd) { transform: translateX(0); }
.tweet-card:nth-child(even) { transform: translateX(0); }

.tweet-card:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: 0 16px 48px rgba(219,39,119,0.1), 0 8px 32px rgba(0,0,0,0.1);
  border-color: rgba(219,39,119,0.2);
}

/* Iridescent border shimmer */
.tweet-card::before {
  content: "";
  position: absolute; inset: -1px; border-radius: inherit; z-index: -1;
  background: linear-gradient(135deg, rgba(219,39,119,0.15), rgba(202,138,4,0.15), rgba(59,130,246,0.1));
  opacity: 0; transition: opacity 0.4s ease;
}
.tweet-card:hover::before { opacity: 1; }

.tweet-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}

.tweet-username { font-family: var(--font-display); font-weight: 400; font-size: 17px; color: var(--text-primary); }
.tweet-mood { font-size: 16px; }
.tweet-time { margin-left: auto; font-size: 12px; color: var(--text-tertiary); font-weight: 300; }

.tweet-body { font-size: 15px; line-height: 1.8; }
.tweet-body p { margin-bottom: 10px; }
.tweet-body p:last-child { margin-bottom: 0; }
.tweet-body strong { font-weight: 700; }
.tweet-body a { color: var(--accent-pink); text-decoration: none; font-weight: 600; }
.tweet-body a:hover { text-decoration: underline; text-underline-offset: 3px; }
.tweet-body code { font-size: 0.88em; background: rgba(0,0,0,0.04); padding: 2px 6px; border-radius: 6px; }
.tweet-body pre { background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.06); border-radius: 16px; padding: 16px 20px; margin: 12px 0; overflow-x: auto; font-size: 13px; }
.tweet-body blockquote { border-left: 2px solid var(--accent-gold); padding-left: 16px; margin: 14px 0; color: var(--text-secondary); }
.tweet-body img { max-width: 100%; border-radius: 16px; margin: 12px 0; }
.tweet-body h1,.tweet-body h2,.tweet-body h3{font-family:var(--font-display);font-weight:400;margin:20px 0 10px}

.tweet-card-empty { text-align: center; padding: 64px; background: var(--glass); backdrop-filter: blur(24px); border-radius: 24px; border: 1px solid var(--glass-border); }
.tweet-card-empty h2 { font-family: var(--font-display); font-size: 22px; font-weight: 400; margin-bottom: 8px; }
.tweet-card-empty p { color: var(--text-tertiary); }

.footer { text-align: center; padding: 24px 0 48px; font-size: 12px; color: var(--text-tertiary); font-weight: 300; }

@media (max-width: 640px) {
  .app { padding: 0 16px; }
  .hero { padding: 40px 0 24px; }
  .hero-username { font-size: 26px; }
  .tweet-card { padding: 20px 22px; border-radius: 20px; }
}

@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
</style>
</head>
<body>
<div class="orb orb-1" aria-hidden="true"></div>
<div class="orb orb-2" aria-hidden="true"></div>
<div class="orb orb-3" aria-hidden="true"></div>
<main class="app">
  <header id="profile" class="hero"></header>
  <div id="timeline" class="timeline"></div>
  <footer id="footer" class="footer"></footer>
</main>
<script type="module" src="/src/main.ts"></script>
<script type="module" src="/src/main-variant.ts"></script>
</body>
</html>
