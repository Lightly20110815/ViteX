<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>14-aurora — ViteX Demo</title>
<style>
/* ===== Variant 14 — Aurora Glass (极光玻璃) =====
   Northern lights · Gradient chrome · Ethereal
   Typography: Outfit + DM Sans
   ========================================== */

@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --font-display: "Outfit", system-ui, sans-serif;
  --font-body: "DM Sans", "Noto Sans SC", system-ui, sans-serif;
  --bg-deep: #0A0D14;
  --glass: rgba(16,20,30,0.7);
  --glass-border: rgba(255,255,255,0.06);
  --text-primary: #EDF2F9;
  --text-secondary: #A0B4D0;
  --text-tertiary: #607090;
  --aurora-green: #34D399;
  --aurora-purple: #A78BFA;
  --aurora-blue: #60A5FA;
  --aurora-pink: #F472B6;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.7;
  color: var(--text-primary);
  background: var(--bg-deep);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Aurora animation as background */
.aurora {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}

.aurora-band {
  position: absolute;
  width: 200%; height: 60%;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.3;
  animation: auroraFlow 20s ease-in-out infinite;
}

.aurora-band:nth-child(1) {
  background: var(--aurora-green);
  top: -20%; left: -40%;
  animation-delay: 0s;
}

.aurora-band:nth-child(2) {
  background: var(--aurora-purple);
  top: 20%; left: -30%;
  animation-delay: -7s;
  animation-duration: 25s;
}

.aurora-band:nth-child(3) {
  background: var(--aurora-blue);
  top: 50%; left: -20%;
  animation-delay: -14s;
  animation-duration: 22s;
}

.aurora-band:nth-child(4) {
  background: var(--aurora-pink);
  top: -30%; left: -50%;
  animation-delay: -3s;
  animation-duration: 28s;
}

@keyframes auroraFlow {
  0%,100% { transform: translateX(0) translateY(0) rotate(0deg); }
  25% { transform: translateX(10%) translateY(-5%) rotate(3deg); }
  50% { transform: translateX(-5%) translateY(8%) rotate(-2deg); }
  75% { transform: translateX(8%) translateY(-3%) rotate(1deg); }
}

.app { position: relative; z-index: 10; max-width: 620px; margin: 0 auto; padding: 0 20px; }

.hero { padding: 56px 0 36px; text-align: center; }

.hero-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); }
.hero-avatar-fallback { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink)); color: #FFF; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 28px; font-weight: 600; margin: 0 auto; }
.hero-username { font-family: var(--font-display); font-size: 36px; font-weight: 700; letter-spacing: -0.02em; margin: 16px 0 8px; background: linear-gradient(135deg, var(--aurora-green), var(--aurora-blue), var(--aurora-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.hero-bio { font-size: 14px; color: var(--text-secondary); max-width: 420px; margin: 0 auto; }

.timeline { display: flex; flex-direction: column; gap: 18px; padding-bottom: 40px; }

.tweet-card {
  background: var(--glass);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 24px 28px;
  transition: all 0.3s ease;
}
.tweet-card:hover { border-color: rgba(167,139,250,0.2); box-shadow: 0 0 32px rgba(167,139,250,0.05); transform: translateY(-1px); }

.tweet-header { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
.tweet-username { font-family: var(--font-display); font-weight: 600; font-size: 15px; }
.tweet-mood { font-size: 15px; }
.tweet-time { margin-left: auto; font-size: 11px; color: var(--text-tertiary); }

.tweet-body { font-size: 15px; line-height: 1.75; }
.tweet-body p { margin-bottom: 10px; }
.tweet-body strong { font-weight: 600; }
.tweet-body a { color: var(--aurora-blue); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
.tweet-body a:hover { border-bottom-color: var(--aurora-blue); }
.tweet-body code { font-size: 0.88em; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; color: var(--aurora-green); }
.tweet-body pre { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; padding: 14px 18px; margin: 12px 0; overflow-x: auto; font-size: 13px; }
.tweet-body blockquote { border-left: 2px solid var(--aurora-purple); padding-left: 14px; margin: 14px 0; color: var(--text-secondary); }
.tweet-body img { max-width: 100%; border-radius: 12px; margin: 10px 0; }
.tweet-body h1,.tweet-body h2,.tweet-body h3{font-family:var(--font-display);font-weight:600;margin:20px 0 10px}

.tweet-card-empty { text-align: center; padding: 56px 24px; }
.tweet-card-empty h2 { font-family: var(--font-display); font-size: 22px; margin-bottom: 8px; }

.footer { text-align: center; padding: 24px 0 48px; font-size: 12px; color: var(--text-tertiary); }

@media(max-width:640px){.app{padding:0 16px}.hero-username{font-size:28px}.tweet-card{padding:18px 20px}}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
</style>
</head>
<body>
<div class="aurora" aria-hidden="true"><div class="aurora-band"></div><div class="aurora-band"></div><div class="aurora-band"></div><div class="aurora-band"></div></div>
<main class="app"><header id="profile" class="hero"></header><div id="timeline" class="timeline"></div><footer id="footer" class="footer"></footer></main>
<script type="module" src="/src/main-variant.ts"></script>
</body>
</html>
