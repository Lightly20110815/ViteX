<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>05-brutalist — ViteX Demo</title>
<style>
/* ===== Variant 5 — Brutalist Bold (粗野宣言) =====
   Raw · Oversized · Monospace · Black & White
   Typography: Space Mono + Noto Sans SC
   ========================================== */

@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

:root {
  --font-mono: "Space Mono", "Noto Sans SC", monospace;
  --bg: #FFFFFF;
  --text: #000000;
  --border: #000000;
  --highlight-bg: #000000;
  --highlight-text: #FFFFFF;
}

:root[data-theme="dark"] {
  --bg: #000000;
  --text: #FFFFFF;
  --border: #FFFFFF;
  --highlight-bg: #FFFFFF;
  --highlight-text: #000000;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 400;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
}

/* ----- Grid-based brutalist layout ----- */
.app {
  display: grid;
  grid-template-columns: 1fr;
  max-width: 100%;
  min-height: 100vh;
}

.hero {
  padding: 60px 40px 40px;
  border-bottom: 4px solid var(--border);
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 24px;
  align-items: start;
}

.hero-avatar {
  width: 100px; height: 100px;
  border: 4px solid var(--border);
  object-fit: cover;
  filter: grayscale(100%) contrast(1.2);
}

.hero-avatar-fallback {
  width: 100px; height: 100px;
  border: 4px solid var(--border);
  background: var(--highlight-bg);
  color: var(--highlight-text);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 36px;
  font-weight: 700;
}

.hero-text { display: flex; flex-direction: column; gap: 8px; }

.hero-username {
  font-size: clamp(36px, 8vw, 72px);
  font-weight: 700;
  line-height: 0.9;
  text-transform: uppercase;
  letter-spacing: -0.02em;
}

.hero-bio {
  font-size: 14px;
  font-weight: 400;
  line-height: 1.6;
  color: var(--text);
  opacity: 0.7;
  max-width: 600px;
}

/* ----- Timeline ----- */
.timeline {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
}

.tweet-card {
  padding: 32px 40px;
  border-bottom: 2px solid var(--border);
  transition: background 0.1s ease;
}

.tweet-card:hover { background: var(--highlight-bg); color: var(--highlight-text); }
.tweet-card:hover .tweet-time { color: var(--highlight-text); opacity: 0.6; }

.tweet-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 12px;
}

.tweet-username {
  font-weight: 700;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.tweet-mood { font-size: 16px; }

.tweet-time {
  margin-left: auto;
  font-size: 12px;
  font-weight: 400;
  opacity: 0.5;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.tweet-body {
  font-size: 18px;
  line-height: 1.5;
}

.tweet-body p { margin-bottom: 12px; }
.tweet-body p:last-child { margin-bottom: 0; }
.tweet-body strong { font-weight: 700; text-transform: uppercase; }
.tweet-body em { font-style: italic; }
.tweet-body del { text-decoration: line-through; }
.tweet-body a { color: inherit; text-decoration: underline; text-underline-offset: 4px; text-decoration-thickness: 2px; }
.tweet-body code { font-size: 0.9em; border: 2px solid var(--border); padding: 2px 8px; display: inline-block; }
.tweet-body pre { border: 2px solid var(--border); padding: 20px; margin: 16px 0; overflow-x: auto; }
.tweet-body pre code { border: none; padding: 0; }
.tweet-body blockquote { border-left: 4px solid var(--border); padding: 4px 0 4px 20px; margin: 16px 0; }
.tweet-body img { max-width: 100%; border: 2px solid var(--border); margin: 12px 0; filter: grayscale(100%); }
.tweet-body ul, .tweet-body ol { padding-left: 2em; margin-bottom: 12px; }
.tweet-body li { margin-bottom: 6px; }
.tweet-body h1 { font-size: 2em; font-weight: 700; text-transform: uppercase; margin: 24px 0 12px; }
.tweet-body h2 { font-size: 1.5em; font-weight: 700; text-transform: uppercase; margin: 20px 0 10px; }
.tweet-body h3 { font-size: 1.2em; font-weight: 700; text-transform: uppercase; margin: 16px 0 8px; }

/* Empty */
.tweet-card-empty {
  padding: 80px 40px;
  text-align: center;
  border-bottom: 2px solid var(--border);
}
.tweet-card-empty h2 { font-size: 32px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
.tweet-card-empty p { opacity: 0.5; }

.footer {
  padding: 24px 40px 48px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.4;
}

@media (max-width: 640px) {
  .hero { padding: 40px 20px 28px; grid-template-columns: 1fr; }
  .hero-avatar, .hero-avatar-fallback { width: 72px; height: 72px; }
  .hero-username { font-size: 40px; }
  .tweet-card { padding: 24px 20px; }
  .tweet-body { font-size: 15px; }
}

@media (prefers-reduced-motion: reduce) { *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;} }
</style>
</head>
<body>
<div class="app">
  <header id="profile" class="hero"></header>
  <div id="timeline" class="timeline"></div>
  <footer id="footer" class="footer"></footer>
</div>
<script type="module" src="/src/main.ts"></script>
<script type="module" src="/src/main-variant.ts"></script>
</body>
</html>
