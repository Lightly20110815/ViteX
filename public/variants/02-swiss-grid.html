<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>02-swiss-grid — ViteX Demo</title>
<style>
/* ==============================================
   Variant 2 — Swiss Grid (瑞士网格)
   Light-first · Asymmetric grid · Pure typography
   Typography: Inter only (6 weights)
   Palette: Zinc monochrome + single blue
   ============================================== */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --font-sans: "Inter", "Noto Sans SC", system-ui, sans-serif;
  --bg: #FAFAFA;
  --surface: #FFFFFF;
  --border: #E5E5E5;
  --text-primary: #09090B;
  --text-secondary: #52525B;
  --text-tertiary: #A1A1AA;
  --accent: #2563EB;
  --radius: 0px;
  --transition: 180ms ease;
}

:root[data-theme="dark"] {
  --bg: #09090B;
  --surface: #18181B;
  --border: #27272A;
  --text-primary: #FAFAFA;
  --text-secondary: #A1A1AA;
  --text-tertiary: #52525B;
  --accent: #3B82F6;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.65;
  color: var(--text-primary);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

/* ----- Asymmetrical Grid Layout ----- */
.app {
  display: grid;
  grid-template-columns: 1fr 320px;
  grid-template-rows: auto 1fr auto;
  gap: 0;
  max-width: 960px;
  margin: 0 auto;
  min-height: 100vh;
}

.hero {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0 24px;
  padding: 48px 40px 32px;
  border-bottom: 2px solid var(--text-primary);
  align-items: end;
}

.hero-avatar-wrap {
  grid-row: 1 / 3;
}

.hero-avatar {
  width: 64px;
  height: 64px;
  border-radius: 2px;
  object-fit: cover;
}

.hero-avatar-fallback {
  width: 64px;
  height: 64px;
  border-radius: 2px;
  background: var(--text-primary);
  color: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-sans);
  font-size: 24px;
  font-weight: 700;
}

.hero-username {
  font-size: 48px;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 0.9;
  color: var(--text-primary);
}

.hero-bio {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.6;
}

.sidebar {
  padding: 32px 32px 32px 40px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.sidebar-link {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-tertiary);
  text-decoration: none;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: color var(--transition);
  padding: 4px 0;
}
.sidebar-link:hover { color: var(--text-primary); }

.timeline {
  padding: 32px 40px;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

.footer {
  grid-column: 1 / -1;
  padding: 24px 40px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* ----- Post Card ----- */
.post-card {
  position: relative;
  padding-left: 0;
}

.post-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 8px;
}

.post-username {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

.post-mood { font-size: 14px; }

.post-time {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-tertiary);
  margin-left: auto;
  font-feature-settings: "tnum";
}

.post-body {
  font-size: 17px;
  line-height: 1.7;
  color: var(--text-primary);
}

.post-body p { margin-bottom: 10px; }
.post-body p:last-child { margin-bottom: 0; }
.post-body strong { font-weight: 700; }
.post-body em { font-style: italic; }
.post-body a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
.post-body code { font-size: 0.9em; background: var(--border); padding: 1px 5px; border-radius: 2px; }
.post-body pre { background: var(--surface); border: 1px solid var(--border); padding: 14px 18px; margin: 12px 0; overflow-x: auto; font-size: 13px; }
.post-body blockquote { border-left: 3px solid var(--text-primary); padding-left: 16px; margin: 14px 0; color: var(--text-secondary); }
.post-body img { max-width: 100%; margin: 12px 0; }
.post-body h1, .post-body h2, .post-body h3 { font-weight: 700; margin: 20px 0 8px; letter-spacing: -0.02em; }

.post-card::after {
  content: "";
  display: block;
  height: 1px;
  background: var(--border);
  margin-top: 32px;
}

.post-card:last-child::after { display: none; }

/* Empty */
.post-card-empty { text-align: center; padding: 80px 0; }
.post-card-empty h2 { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
.post-card-empty p { color: var(--text-tertiary); }

@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .hero { padding: 32px 20px 24px; }
  .hero-username { font-size: 32px; }
  .sidebar { display: none; }
  .timeline { padding: 24px 20px; gap: 24px; }
  .footer { padding: 20px; }
}
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration:0.01ms!important; transition-duration:0.01ms!important; } }
</style>
</head>
<body>
<div class="app">
  <header id="profile" class="hero"></header>
  <nav class="sidebar" id="sidebar" aria-label="Sidebar"></nav>
  <main id="timeline" class="timeline"></main>
  <footer id="footer" class="footer"></footer>
</div>
<script type="module" src="/src/main-variant.ts"></script>
<script type="module" src="/src/main-variant.ts"></script>
</body>
</html>
