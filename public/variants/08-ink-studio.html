<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>08-ink-studio — ViteX Demo</title>
<style>
/* ===== Variant 8 — Ink Studio (墨色工作室) =====
   Editorial · Oversized numerals · Massive whitespace
   Typography: Archivo + Space Grotesk
   ========================================== */

@import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --font-display: "Space Grotesk", system-ui, sans-serif;
  --font-body: "Archivo", "Noto Sans SC", system-ui, sans-serif;
  --font-serif: "Noto Serif JP", Georgia, serif;
  --font-mono: "JetBrains Mono", monospace;
  --bg-page: #F8F6F4;
  --bg-card: #FFFFFF;
  --text-primary: #1A1A1A;
  --text-secondary: #666666;
  --text-tertiary: #B0B0B0;
  --accent-gold: #C9A84C;
  --border: #E8E5E0;
  --border-dark: #1A1A1A;
}

:root[data-theme="dark"] {
  --bg-page: #111110;
  --bg-card: #1A1A19;
  --text-primary: #EDEDE8;
  --text-secondary: #999990;
  --text-tertiary: #555550;
  --accent-gold: #D4AF37;
  --border: #2A2A28;
  --border-dark: #EDEDE8;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 400;
  line-height: 1.6;
  color: var(--text-primary);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
}

/* ----- Editorial Layout: Two-column on desktop ----- */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  max-width: 1080px;
  margin: 0 auto;
  min-height: 100vh;
}

/* ----- Left rail: Profile + Navigation (sticky) ----- */
.rail {
  padding: 60px 40px 40px 32px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.rail-avatar {
  width: 56px; height: 56px;
  border-radius: 2px;
  object-fit: cover;
  filter: grayscale(30%);
  margin-bottom: 24px;
}

.rail-avatar-fallback {
  width: 56px; height: 56px;
  border-radius: 2px;
  background: var(--text-primary);
  color: var(--bg-page);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 24px;
}

.rail-name {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}

.rail-bio {
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-secondary);
  margin-bottom: 32px;
}

.rail-nav { display: flex; flex-direction: column; gap: 2px; margin-top: auto; }

.rail-link {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-tertiary);
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 6px 0;
  transition: color 0.2s;
}
.rail-link:hover { color: var(--text-primary); }

/* ----- Main content area ----- */
.main-content { padding: 60px 48px 40px; }

.page-title {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--text-tertiary);
  margin-bottom: 48px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--border-dark);
}

/* ----- Timeline as article list ----- */
.timeline { display: flex; flex-direction: column; gap: 0; }

.tweet-card {
  padding: 32px 0;
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 24px;
  transition: background 0.15s ease;
}

.tweet-card:hover { background: rgba(0,0,0,0.01); }

/* Left column: Date display */
.tweet-date-col {
  text-align: right;
  padding-top: 2px;
}

.tweet-date-num {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 300;
  line-height: 0.9;
  color: var(--text-primary);
  letter-spacing: -0.03em;
}

.tweet-date-month {
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-tertiary);
  margin-top: 4px;
}

/* Right column: Content */
.tweet-content-col { min-width: 0; }

.tweet-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 10px;
}

.tweet-username {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.02em;
}

.tweet-mood { font-size: 14px; }

.tweet-time {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
}

.tweet-body {
  font-size: 16px;
  line-height: 1.75;
}

.tweet-body p { margin-bottom: 10px; }
.tweet-body p:last-child { margin-bottom: 0; }
.tweet-body strong { font-weight: 600; }
.tweet-body em { font-style: italic; }
.tweet-body del { text-decoration: line-through; opacity: 0.5; }
.tweet-body a { color: var(--accent-gold); text-decoration: none; border-bottom: 1px solid var(--accent-gold); }
.tweet-body a:hover { color: var(--text-primary); border-bottom-color: var(--text-primary); }
.tweet-body code { font-family: var(--font-mono); font-size: 0.85em; background: var(--border); padding: 2px 6px; }
.tweet-body pre { background: var(--bg-card); border: 1px solid var(--border); padding: 16px 20px; margin: 14px 0; overflow-x: auto; font-size: 13px; }
.tweet-body pre code { background: none; padding: 0; }
.tweet-body blockquote { border-left: 3px solid var(--accent-gold); padding-left: 18px; margin: 16px 0; font-family: var(--font-serif); font-style: italic; color: var(--text-secondary); }
.tweet-body img { max-width: 100%; margin: 14px 0; }
.tweet-body h1,.tweet-body h2,.tweet-body h3{font-family:var(--font-display);font-weight:500;margin:24px 0 12px;letter-spacing:-0.01em}

/* Empty */
.tweet-card-empty { grid-template-columns: 1fr; text-align: center; padding: 80px 0; }
.tweet-card-empty h2 { font-family: var(--font-display); font-size: 32px; font-weight: 300; margin-bottom: 8px; }
.tweet-card-empty p { color: var(--text-tertiary); }

.footer { padding: 24px 0 48px; font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; }

@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .rail { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 40px 20px 32px; }
  .main-content { padding: 32px 20px 24px; }
  .tweet-card { grid-template-columns: 56px 1fr; gap: 16px; }
  .tweet-date-num { font-size: 32px; }
}

@media (prefers-reduced-motion: reduce) { *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important} }
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div id="rail-profile"></div>
    <nav class="rail-nav" id="rail-nav" aria-label="Navigation"></nav>
  </aside>
  <main class="main-content">
    <div class="page-title">Timeline</div>
    <div id="timeline" class="timeline"></div>
    <footer id="footer" class="footer"></footer>
  </main>
</div>
<script type="module" src="/src/main.ts"></script>
<script type="module" src="/src/main-variant.ts"></script>
</body>
</html>
