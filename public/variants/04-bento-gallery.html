<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>04-bento-gallery — ViteX Demo</title>
<style>
/* ===== Variant 4 — Bento Gallery (本顿画廊) =====
   Apple-style · Modular grid · Multi-size cards
   Typography: Inter
   ========================================== */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --font-sans: "Inter", "Noto Sans SC", system-ui, sans-serif;
  --bg: #F5F5F7;
  --bg-card: #FFFFFF;
  --text-primary: #1D1D1F;
  --text-secondary: #6E6E73;
  --text-tertiary: #AEAEB2;
  --blue: #0071E3;
  --orange: #F56300;
  --green: #30B454;
  --purple: #A855F7;
  --pink: #EC4899;
  --border: rgba(0,0,0,0.06);
  --shadow: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.08);
  --radius: 20px;
}

:root[data-theme="dark"] {
  --bg: #1C1C1E;
  --bg-card: #2C2C2E;
  --text-primary: #F5F5F7;
  --text-secondary: #AEAEB2;
  --text-tertiary: #636366;
  --blue: #4DA4FF;
  --border: rgba(255,255,255,0.06);
  --shadow: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.5);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.6;
  color: var(--text-primary);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 880px;
  margin: 0 auto;
  padding: 40px 24px;
}

/* ----- Bento Grid for Profile + Info ----- */
.hero-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 16px;
  margin-bottom: 24px;
}

.hero-profile {
  grid-column: 1 / 3;
  grid-row: 1 / 3;
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.hero-profile::after {
  content: "";
  position: absolute;
  bottom: -40px; right: -40px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(0,113,227,0.08) 0%, transparent 70%);
  border-radius: 50%;
}

.hero-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 16px;
}

.hero-avatar-fallback {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  color: #FFF;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 16px;
}

.hero-username { font-size: 36px; font-weight: 800; letter-spacing: -0.03em; }
.hero-bio { margin-top: 8px; font-size: 14px; color: var(--text-secondary); line-height: 1.7; }

/* Stat cards */
.hero-stat {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: default;
}
.hero-stat:hover { transform: scale(1.02); box-shadow: var(--shadow-hover); }

.hero-stat-value { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; }
.hero-stat-label { font-size: 12px; color: var(--text-tertiary); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }

/* Timeline as bento cards */
.timeline {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  padding-bottom: 40px;
}

.tweet-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: pointer;
}

/* Varied card spans for visual rhythm */
.tweet-card:nth-child(5n+1) { grid-column: span 2; }
.tweet-card:nth-child(5n+3) { grid-column: span 2; }

.tweet-card:hover {
  transform: scale(1.02);
  box-shadow: var(--shadow-hover);
}

/* Color accent top border per card */
.tweet-card:nth-child(4n+1) { border-top: 3px solid var(--blue); }
.tweet-card:nth-child(4n+2) { border-top: 3px solid var(--orange); }
.tweet-card:nth-child(4n+3) { border-top: 3px solid var(--green); }
.tweet-card:nth-child(4n+0) { border-top: 3px solid var(--purple); }

.tweet-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
}

.tweet-username { font-weight: 700; font-size: 14px; }
.tweet-mood { font-size: 14px; }
.tweet-time { margin-left: auto; font-size: 11px; color: var(--text-tertiary); font-weight: 500; }

.tweet-body { font-size: 15px; line-height: 1.7; }
.tweet-body p { margin-bottom: 10px; }
.tweet-body p:last-child { margin-bottom: 0; }
.tweet-body strong { font-weight: 700; }
.tweet-body a { color: var(--blue); text-decoration: none; }
.tweet-body a:hover { text-decoration: underline; }
.tweet-body code { font-size: 0.88em; background: var(--bg); padding: 2px 6px; border-radius: 4px; }
.tweet-body pre { background: var(--bg); border-radius: 12px; padding: 14px 18px; margin: 10px 0; overflow-x: auto; font-size: 13px; }
.tweet-body pre code { background: none; padding: 0; }
.tweet-body blockquote { border-left: 3px solid var(--border); padding-left: 14px; margin: 12px 0; color: var(--text-secondary); }
.tweet-body img { max-width: 100%; border-radius: 12px; margin: 10px 0; }
.tweet-body h1, .tweet-body h2, .tweet-body h3 { font-weight: 700; margin: 18px 0 8px; }

/* Empty state spans full width */
.tweet-card-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 72px 24px;
}
.tweet-card-empty h2 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
.tweet-card-empty p { color: var(--text-tertiary); }

.footer {
  grid-column: 1 / -1;
  text-align: center;
  padding: 16px 0 40px;
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
}

@media (max-width: 768px) {
  .hero-grid { grid-template-columns: 1fr 1fr; }
  .hero-profile { grid-column: 1 / -1; padding: 32px; }
  .timeline { grid-template-columns: 1fr; }
  .tweet-card:nth-child(n) { grid-column: span 1; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration:0.01ms!important; transition-duration:0.01ms!important; }
}
</style>
</head>
<body>
<div class="app">
  <section class="hero-grid">
    <div class="hero-profile" id="profile-section"></div>
    <div class="hero-stat"><div class="hero-stat-value" id="stat-posts">0</div><div class="hero-stat-label">Posts</div></div>
    <div class="hero-stat"><div class="hero-stat-value" id="stat-words">0</div><div class="hero-stat-label">Words</div></div>
  </section>
  <div id="timeline" class="timeline"></div>
  <footer id="footer" class="footer"></footer>
</div>
<script type="module" src="/src/main.ts"></script>
<script type="module" src="/src/main-variant.ts"></script>
</body>
</html>
